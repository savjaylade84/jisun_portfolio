{% block meta%}


            <!-- SEO Optimization -->
    
            <!-- icon logo on the tab of the browsers -->
			<link rel="icon" href="{{ url_for('static',filename=information['Logo']) }}" type="image/icon type">

            <!-- title on the tab of the browser -->
            <title>{{ page_title | default(information['seo-title']) }}</title>

            <!-- author information -->
            <meta name="author" content="{{information['Author']}}">

			<!-- Primary Meta Tags -->
			<title>{{information['Author']}} - Software Developer</title>
			<meta name="title" content="{{information['Author']}} - {{information['seo-title']}}">
			<meta name="description" content="{{information['seo-description']}}">

			<!-- Open Graph / Facebook -->
			<meta property="og:type" content="website">
			<meta property="og:url" content="{{information['Website']}}">
			<meta property="og:title" content="{{information['Author']}} - {{information['seo-title']}}">
			<meta property="og:description" content="{{information['seo-description']}}">
			<meta property="og:image" content="{{information['Author-Pixel-Picture']}}">

			<!-- Twitter -->
			<meta property="twitter:card" content="summary_large_image">
            <meta name="twitter:site" content="@johnjaysonbdel1">
			<meta property="twitter:url" content="{{information['Twitter']}}">
			<meta property="twitter:title" content="{{information['Author']}} - {{information['seo-title']}}">
			<meta property="twitter:description" content="{{information['seo-description']}}">
			<meta property="twitter:image" content="{{information['Author-Pixel-Picture']}}">
        
            <!-- website config on the browser -->
			<meta name="viewport" content="width=device-width,initial-scale=1">
			<meta name="robots" content="index,follow">
			<meta charset="utf-8" lang="en">

            <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-EVSTQN3/azprG1Anm3QDgpJLIm9Nao0Yz1ztcQTwFspd3yD65VohhpuuCOmLASjC" crossorigin="anonymous">
            
            <!-- lato font style -->
            <link href='https://fonts.googleapis.com/css?family=Lato' rel='stylesheet'>
            <link rel="preconnect" href="https://fonts.googleapis.com">

            <!-- roboto font style -->
            <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
            <link href="https://fonts.googleapis.com/css2?family=Roboto:ital,wght@0,100..900;1,100..900&display=swap" rel="stylesheet">

{% endblock %}
